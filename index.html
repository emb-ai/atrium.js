<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slides + Drawing</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="drawing-enabled">
  <div class="canvas-wrap">

    <!-- Slides (empty divs to be filled by preloaded SVGs) -->
    <div id="slides">
      <div class="slide" data-src="1.svg"></div>
      <div class="slide" data-src="2.svg"></div>
      <div class="slide" data-src="3.svg"></div>
    </div>

    <!-- Drawing canvas (on top) -->
    <canvas id="c"></canvas>
  </div>

  <script src="./script.js"></script>
</body>
</html>
