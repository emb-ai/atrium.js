<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speaker</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="drawing-enabled">
  <div class="canvas-wrap">

    <!-- Slides (empty divs to be filled by preloaded SVGs)
         Each referenced SVG may contain a <desc id="slide-notes"> element
         with speaker notes for that slide, e.g.:

           <desc id="slide-notes">Mention the Q3 results here.
           Talk about the new product roadmap.</desc>

         Notes are shown in the notes bar below (speaker window only)
         whenever the slideshow window is open.
    -->
    <div id="slides">
      <div class="slide" data-src="slides/1.svg" data-notes="Introduce the topic.&#10;Mention key goals."></div>
      <div class="slide" data-src="slides/slide1.svg"></div>
      <div class="slide" data-src="slides/2.svg"></div>
      <div class="slide" data-src="slides/3.svg"></div>
    </div>

    <!-- Whiteboard page: a blank "slide" shown only in whiteboard mode.
         Positioned from JS to match getReferenceBox() so it lines up exactly
         with the letterboxed area a real slide would occupy. -->
    <div id="whiteboard-page" aria-hidden="true"></div>

    <!-- Drawing canvas (on top) -->
    <canvas id="c"></canvas>

    <!-- Slide progress indicator (slideshow window only) -->
    <div id="progress-indicator" aria-hidden="true">
      <span class="progress-current">1</span>
      <span class="progress-sep">/</span>
      <span class="progress-total">1</span>
    </div>

    <!-- Freeze-mode indicator (main window only; shown while frozen) -->
    <div id="freeze-indicator" aria-hidden="true">
      <span class="freeze-dot"></span>
      <span class="freeze-label">Frozen</span>
      <span class="freeze-hint">press&nbsp;<kbd>F</kbd>&nbsp;to resume</span>
    </div>

    <!-- Speaker toolbar (speaker window only) — mirrors every keyboard shortcut
         as a clickable, tooltipped button so features are discoverable. -->
    <div id="toolbar" role="toolbar" aria-label="Speaker controls">
      <button type="button" class="tb-btn" data-action="prev" title="Previous slide (←)" aria-label="Previous slide">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M10 3L5 8l5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="tb-btn" data-action="next" title="Next slide (→)" aria-label="Next slide">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6 3l5 5-5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="tb-sep"></span>
      <button type="button" class="tb-btn tb-btn-cursor" data-action="cursor" title="Cursor (M)" aria-label="Toggle cursor mode">
        <img src="cursor.svg" alt="" aria-hidden="true">
      </button>
      <button type="button" class="tb-btn" data-action="laser" title="Laser pointer (L)" aria-label="Toggle laser pointer">
        <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="5" fill="#dc2626"/></svg>
      </button>
      <button type="button" class="tb-btn" data-action="draw" title="Draw (P)" aria-label="Toggle drawing">
        <svg viewBox="16 16 68 68" aria-hidden="true"><path fill="currentColor" d="M74.15 20.4Q71.6 18 68.4 18 65.15 18 62.75 20.4L28.45 54.75Q26.9 56.25 24.6 59.45 22.15 62.95 22 64.45L18 82 35.7 78Q43.8 73.35 45.45 71.7L79.75 37.45Q82 35 82 31.75 82 28.5 79.75 26L74.15 20.4M65.6 23.25Q66.75 22 68.4 22 70 22 71.25 23.25L76.9 28.9Q78 30 78 31.75 78 33.45 76.9 34.5L71.25 40.25 59.95 28.9 65.6 23.25M57.1 31.75 68.4 43 42.5 68.95Q41.85 69.6 38.6 71.6L28.2 61.25 31.2 57.6 57.1 31.75M26.1 64.7 35.1 73.7 34.2 74.35 23.45 76.7 26 65.35 26 64.85 26.1 64.7Z"/></svg>
      </button>
      <span class="tb-color-wrap">
        <button type="button" class="tb-btn" data-action="color" title="Stroke color (C)" aria-label="Stroke color">
          <span class="tb-color-dot"></span>
        </button>
        <!-- Color picker (main window only; toggled with C in drawing mode).
             Anchored above the color button via .tb-color-wrap. -->
        <div id="color-picker" aria-hidden="true" role="toolbar" aria-label="Stroke color">
          <div class="cp-swatches"></div>
          <span class="cp-sep"></span>
          <label class="cp-custom" title="Custom color">
            <span class="cp-custom-ring"></span>
            <input type="color" class="cp-input" aria-label="Custom color">
          </label>
        </div>
      </span>
      <button type="button" class="tb-btn" data-action="size-down" title="Smaller stroke (-)" aria-label="Smaller stroke">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 8h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="tb-btn" data-action="size-up" title="Larger stroke (+)" aria-label="Larger stroke">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 8h9M8 3.5v9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="tb-btn" data-action="undo" title="Undo last stroke (Ctrl+Z)" aria-label="Undo last stroke">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 7h7a3 3 0 0 1 0 6H7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 4L2 7l3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="tb-sep"></span>
      <button type="button" class="tb-btn" data-action="whiteboard" title="Whiteboard (B)" aria-label="Toggle whiteboard">
        <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.25" y="2.5" width="11.5" height="11" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <button type="button" class="tb-btn" data-action="slideshow" title="Toggle slideshow window (S)" aria-label="Toggle slideshow window">
        <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 14h5M8 11.5V14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="tb-btn" data-action="freeze" title="Freeze slideshow (F)" aria-label="Toggle freeze">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5v13M1.5 8h13M3.2 3.2l9.6 9.6M12.8 3.2L3.2 12.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Speaker notes bar — visible in speaker window when slideshow window is open -->
  <div id="notes-panel" aria-live="polite">
    <span id="notes-label">Notes</span>
    <div id="notes-content"></div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
