<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Canvas Drawing</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="canvas-wrap">
      <!-- Slide layer – Full HD 16:9 viewBox -->
      <svg id="slide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
        <!-- Background -->
        <rect width="1920" height="1080" fill="#1a1a2e"/>

        <!-- Subtle grid (scaled) -->
        <defs>
          <pattern id="grid" width="144" height="144" patternUnits="userSpaceOnUse">
            <path d="M 144 0 L 0 0 0 144" fill="none" stroke="#ffffff0d" stroke-width="3.6"/>
          </pattern>
        </defs>
        <rect width="1920" height="1080" fill="url(#grid)"/>

        <!-- Accent bar -->
        <rect x="0" y="0" width="21.6" height="1080" fill="#e94560"/>

        <!-- Title -->
        <text x="190" y="245" font-family="Georgia, serif" font-size="101" font-weight="bold" fill="#ffffff">
          Q3 Revenue Overview
        </text>
        <line x1="190" y1="288" x2="1730" y2="288" stroke="#e94560" stroke-width="5.4" opacity="0.6"/>

        <!-- Bar chart – coordinates scaled uniformly by 3.6 -->
        <!-- Apr -->
        <rect x="276" y="720" width="158.4" height="216" fill="#e94560" opacity="0.85" rx="10.8"/>
        <text x="355" y="702" font-family="monospace" font-size="40" fill="#ccc" text-anchor="middle">$42k</text>
        <text x="355" y="1001" font-family="monospace" font-size="40" fill="#888" text-anchor="middle">Apr</text>

        <!-- May -->
        <rect x="528" y="630" width="158.4" height="306" fill="#e94560" opacity="0.85" rx="10.8"/>
        <text x="607" y="612" font-family="monospace" font-size="40" fill="#ccc" text-anchor="middle">$58k</text>
        <text x="607" y="1001" font-family="monospace" font-size="40" fill="#888" text-anchor="middle">May</text>

        <!-- Jun -->
        <rect x="780" y="558" width="158.4" height="378" fill="#e94560" opacity="0.85" rx="10.8"/>
        <text x="859" y="540" font-family="monospace" font-size="40" fill="#ccc" text-anchor="middle">$71k</text>
        <text x="859" y="1001" font-family="monospace" font-size="40" fill="#888" text-anchor="middle">Jun</text>

        <!-- Jul (highlighted) -->
        <rect x="1032" y="504" width="158.4" height="432" fill="#16213e" opacity="1" rx="10.8" stroke="#e94560" stroke-width="5.4"/>
        <text x="1111" y="486" font-family="monospace" font-size="40" fill="#e94560" text-anchor="middle" font-weight="bold">$81k</text>
        <text x="1111" y="1001" font-family="monospace" font-size="40" fill="#e94560" text-anchor="middle" font-weight="bold">Jul ▲</text>

        <!-- Aug -->
        <rect x="1284" y="576" width="158.4" height="360" fill="#e94560" opacity="0.85" rx="10.8"/>
        <text x="1363" y="558" font-family="monospace" font-size="40" fill="#ccc" text-anchor="middle">$68k</text>
        <text x="1363" y="1001" font-family="monospace" font-size="40" fill="#888" text-anchor="middle">Aug</text>

        <!-- Sep -->
        <rect x="1536" y="612" width="158.4" height="324" fill="#e94560" opacity="0.85" rx="10.8"/>
        <text x="1615" y="594" font-family="monospace" font-size="40" fill="#ccc" text-anchor="middle">$61k</text>
        <text x="1615" y="1001" font-family="monospace" font-size="40" fill="#888" text-anchor="middle">Sep</text>

        <!-- Baseline -->
        <line x1="190" y1="943" x2="1730" y2="943" stroke="#ffffff22" stroke-width="3.6"/>

        <!-- Key stat -->
        <text x="190" y="396" font-family="Georgia, serif" font-size="47" fill="#ffffff99">
          Peak month: <tspan fill="#e94560" font-weight="bold">July</tspan> · YoY growth: <tspan fill="#4ecca3" font-weight="bold">+23%</tspan>
        </text>
      </svg>

      <!-- Drawing layers (top) -->
      <canvas id="c"></canvas>
      <div id="stroke-count">No strokes</div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
