<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Canvas Drawing</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="canvas-wrap">
      <!-- Slide layer – Full HD 16:9 viewBox -->
      <svg id="slide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
        <!-- Background -->
        <rect width="1920" height="1080" fill="#eee"/>
      </svg>

      <!-- Drawing layers (top) -->
      <canvas id="c"></canvas>
      <div id="stroke-count">No strokes</div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
